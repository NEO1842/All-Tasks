name: Suggestion
description: Suggest an idea
title: " "
labels: ["suggestion"]

body:
  - type: textarea
    id: idea
    attributes:
      label: Idea
    validations:
      required: true

  - type: input
    id: repository
    attributes:
      label: Repository
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
