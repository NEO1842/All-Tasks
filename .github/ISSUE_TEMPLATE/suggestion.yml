name: 💡 Suggestion
description: Suggest an idea or improvement
title: "[SUGGESTION] "
labels: ["suggestion"]

body:
  - type: markdown
    attributes:
      value: |
        ## 💡 Suggestion
        Share your idea.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: What is your idea?
      placeholder: e.g. Add dark mode
    validations:
      required: true

  - type: dropdown
    id: repo
    attributes:
      label: Repository
      description: Which repository is this for?
      options:
        - All-Tasks
        - Portfolio
        - Blender Works
        - Other
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: More info (optional)
      placeholder: Explain if needed
      value: |
        - What:
        - Why:
    validations:
      required: false

  - type: dropdown
    id: impact
    attributes:
      label: Importance
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirm
      options:
        - label: This is a suggestion
          required: true
