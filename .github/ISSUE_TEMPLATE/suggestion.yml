name: 💡 Suggestion
description: Suggest an idea or improvement
title: "　"
labels: ["suggestion"]

body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: What is your idea?
    validations:
      required: true

  - type: input
    id: repository
    attributes:
      label: Repository
      description: Enter repository name
      placeholder: e.g. All-Tasks
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
    validations:
      required: false

  - type: dropdown
    id: importance
    attributes:
      label: Importance
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirm
      options:
        - label: This is a suggestion
          required: true
