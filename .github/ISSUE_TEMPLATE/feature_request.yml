name: Feature request
description: Suggest an idea for this project
title: ""
labels: []
assignees: []

body:
  - type: textarea
    id: problem
    attributes:
      label: 🚨 Problem
      description: What problem are you facing?
      placeholder: Describe the problem clearly...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: What would you like to happen?
      placeholder: Describe your solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives
      description: Other solutions you've considered
      placeholder: Describe alternatives...
    validations:
      required: false

  - type: textarea
    id: spec
    attributes:
      label: 🧩 Specification
      description: Define behavior if possible
      placeholder: |
        Input:
        Output:
        Behavior:
    validations:
      required: false

  - type: checkboxes
    id: done
    attributes:
      label: ✅ Definition of Done
      description: When is this feature considered complete?
      options:
        - label: The feature works as expected
        - label: No errors occur
        - label: No UI/UX issues
        - label: Code is clean and maintainable

  - type: dropdown
    id: priority
    attributes:
      label: ⚡ Priority
      description: Select priority level
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 📎 Additional Context
      description: Add any extra information or screenshots
      placeholder: Additional details...
    validations:
      required: false
