name: Suggestion
description: Suggest an improvement to the structure
title: "[IDEA] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        ## Suggestion
        Propose an improvement to the repository structure.

  - type: textarea
    attributes:
      label: Idea
      description: Describe your idea
    validations:
      required: true

  - type: input
    attributes:
      label: Area
      description: Which part of the structure?
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: This is about structure
          required: true
