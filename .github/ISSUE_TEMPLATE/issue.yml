name: Task / Idea / Suggestion
description: Add a task, plan, or suggestion
title: "[TASK] "

body:
  - type: markdown
    attributes:
      value: |
        ## 🗓 Add a Task / Idea
        Keep it simple. This is a public activity log.

  - type: textarea
    attributes:
      label: Content
      description: Describe the task, plan, or idea
      placeholder: e.g. Create Blender animation / Improve README
      value: |
        - What:
        - When:
        - Notes:
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Type
      options:
        - Task (planned work)
        - Idea (future concept)
        - Suggestion (feedback)
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Priority
      options:
        - Low (someday)
        - Medium (planned)
        - High (soon)
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: Relevant to this project
          required: true
        - label: Clear and simple
          required: true
