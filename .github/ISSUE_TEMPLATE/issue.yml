name: Task / Idea / Suggestion
description: Add a task, plan, or suggestion
title: "[TASK] "
labels: ["task"]
projects: ["NEO1842/4"]

body:
  - type: markdown
    attributes:
      value: |
        ## 🗓 Add a Task / Idea
        Public roadmap of NEO1842.

  - type: textarea
    attributes:
      label: Content
      description: Describe the task or idea
      placeholder: e.g. Create Blender animation
      value: |
        - What:
        - When:
        - Notes:
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Task
        - Idea
        - Suggestion
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Confirm
      options:
        - label: Clear and relevant
          required: true
