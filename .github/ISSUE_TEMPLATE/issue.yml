name: Suggestion
description: Suggest an improvement to the structure
title: "[IDEA] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        ## 💡 Suggestion
        Propose an improvement to the repository structure.

        Keep it minimal, clear, and reusable.

  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: Describe your idea clearly
      placeholder: Explain the improvement...
    validations:
      required: true

  - type: input
    id: area
    attributes:
      label: Area
      description: Which part of the structure?
      placeholder: e.g. README / Projects / Issues
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this?
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: checkboxes
    id: rules
    attributes:
      label: Checklist
      options:
        - label: This is about structure, not personal content
          required: true
        - label: Clear and simple
          required: true
