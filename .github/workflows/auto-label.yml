name: Auto Label by Repository

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Create repo label
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || "";

            // Repository欄を抽出
            const match = body.match(/### Repository\s*\n(.+)/);
            if (!match) return;

            let repo = match[1].trim();

            // 小文字＋スペース→ハイフン
            repo = repo.toLowerCase().replace(/\s+/g, "-");

            const label = `repo:${repo}`;

            // ラベル付与
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [label]
            });
