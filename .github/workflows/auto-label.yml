name: Auto Label by Repository

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";

            // フォームの値はこの形式で入る
            // ### Repository
            // value

            const match = body.match(/### Repository\s*\n(.+)/);

            if (!match) {
              console.log("Repository not found");
              return;
            }

            let repo = match[1].trim();

            if (!repo) return;

            // ラベル用に整形
            repo = repo.toLowerCase().replace(/\s+/g, "-");

            const label = `repo:${repo}`;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [label]
            });
