name: Project Start Mail

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  send-project-mail:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install nodemailer

      - name: Check Project Start Dates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: |

          node <<'EOF'

          const nodemailer = require("nodemailer");

          const owner = "NEO1842";
          const repo = "All-Tasks";

          async function fetchIssues() {

            const res = await fetch(
              `https://api.github.com/repos/${owner}/${repo}/issues`,
              {
                headers: {
                  Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                  Accept: "application/vnd.github+json"
                }
              }
            );

            return await res.json();
          }

          function getLabel(issue, prefix, fallback) {

            const label = issue.labels.find(l =>
              l.name.toLowerCase().startsWith(prefix.toLowerCase())
            );

            return label ? label.name.replace(prefix, "").trim() : fallback;
          }

          async function main() {

            const issues = await fetchIssues();

            const today = new Date().toISOString().split("T")[0];

            let body = "";

            body += "📅 GitHub Project Daily Report\n";
            body += "====================================\n\n";

            const inProgressIssues = [];
            const completedIssues = [];

            for (const issue of issues) {

              if (issue.pull_request) continue;

              const status =
                getLabel(issue, "status:", "No Status");

              const progress =
                getLabel(issue, "progress:", "0%");

              const priority =
                getLabel(issue, "priority:", "Normal");

              const issueData = {
                title: issue.title,
                status,
                progress,
                priority,
                url: issue.html_url
              };

              const isCompleted =
                status.toLowerCase().includes("done") ||
                status.toLowerCase().includes("complete") ||
                status.toLowerCase().includes("completed");

              if (isCompleted) {
                completedIssues.push(issueData);
              } else {
                inProgressIssues.push(issueData);
              }
            }

            if (inProgressIssues.length > 0) {

              body += "🚀 進行中 / 未完了\n";
              body += "------------------------------------\n\n";

              for (const issue of inProgressIssues) {

                body += `📌 ${issue.title}

🚦 Status   : ${issue.status}
📊 Progress : ${issue.progress}
🔥 Priority : ${issue.priority}

🔗 ${issue.url}

━━━━━━━━━━━━━━━━━━━━

`;
              }
            }

            if (completedIssues.length > 0) {

              body += "\n✅ 完了済み\n";
              body += "------------------------------------\n\n";

              for (const issue of completedIssues) {

                body += `✔ ${issue.title}

🚦 Status   : ${issue.status}
📊 Progress : ${issue.progress}
🔥 Priority : ${issue.priority}

🔗 ${issue.url}

━━━━━━━━━━━━━━━━━━━━

`;
              }
            }

            if (
              inProgressIssues.length === 0 &&
              completedIssues.length === 0
            ) {

              body += "No issues found.\n";
            }

            const transporter = nodemailer.createTransport({
              service: "gmail",
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASS
              }
            });

            await transporter.sendMail({
              from: process.env.GMAIL_USER,
              to: process.env.GMAIL_USER,
              subject: `📅 GitHub Project Daily Report (${today})`,
              text: body
            });

            console.log("Mail sent successfully!");
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
EOF
