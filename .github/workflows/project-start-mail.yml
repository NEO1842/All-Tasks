name: Project Start Mail

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Nodemailer
        run: npm install nodemailer

      - name: Check Project Start Dates
        uses: actions/github-script@v8
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const nodemailer = require("nodemailer");

            const today = new Date().toISOString().split('T')[0];

            const query = `
            query {
              node(id: "PVT_kwHODIuak84BVv1F") {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {

                      content {
                        ... on Issue {
                          title
                          url
                          number

                          labels(first: 20) {
                            nodes {
                              name
                            }
                          }
                        }
                      }

                      fieldValues(first: 30) {
                        nodes {

                          ... on ProjectV2ItemFieldDateValue {
                            date
                            field {
                              ... on ProjectV2FieldCommon {
                                name
                              }
                            }
                          }

                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field {
                              ... on ProjectV2FieldCommon {
                                name
                              }
                            }
                          }

                        }
                      }

                    }
                  }
                }
              }
            }`;

            const result = await github.graphql(query);

            const activeIssues = [];
            const completedIssues = [];

            for (const item of result.node.items.nodes) {

              const issue = item.content;

              if (!issue) continue;

              let startDate = null;
              let status = "Unknown";
              let progress = "Unknown";

              for (const field of item.fieldValues.nodes) {

                if (
                  field.field?.name === "Start Date"
                ) {
                  startDate = field.date;
                }

                if (
                  field.field?.name === "Status"
                ) {
                  status = field.name;
                }

                if (
                  field.field?.name === "Progress"
                ) {
                  progress = field.name;
                }

              }

              if (startDate !== today) continue;

              const labels = issue.labels.nodes.map(l => l.name);

              const priority =
                labels.find(l =>
                  l.toLowerCase().includes("priority")
                ) || "No Priority";

              const data = {
                title: issue.title,
                url: issue.url,
                status,
                progress,
                priority
              };

              if (
                status.toLowerCase().includes("done") ||
                status.toLowerCase().includes("complete") ||
                status.toLowerCase().includes("completed")
              ) {
                completedIssues.push(data);
              } else {
                activeIssues.push(data);
              }

            }

            if (
              activeIssues.length === 0 &&
              completedIssues.length === 0
            ) {
              console.log("No issues starting today.");
              return;
            }

            const transporter = nodemailer.createTransport({
              service: "gmail",
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASS
              }
            });

            let body = "";

            body += "📅 今日開始のGitHub課題\n";
            body += "====================================\n\n";

            if (activeIssues.length > 0) {

              body += "🚀 進行中 / 未完了\n";
              body += "------------------------------------\n\n";

              for (const issue of activeIssues) {

                body +=
`📌 ${issue.title}

🚦 Status   : ${issue.status}
📊 Progress : ${issue.progress}
🔥 Priority : ${issue.priority}

🔗 ${issue.url}

━━━━━━━━━━━━━━━━━━━━

`;

              }

            }

            if (completedIssues.length > 0) {

              body += "\n✅ 完了済み\n";
              body += "------------------------------------\n\n";

              for (const issue of completedIssues) {

                body +=
`✔ ${issue.title}

🚦 Status   : ${issue.status}
📊 Progress : ${issue.progress}
🔥 Priority : ${issue.priority}

🔗 ${issue.url}

━━━━━━━━━━━━━━━━━━━━

`;

              }

            }

            await transporter.sendMail({
              from: process.env.GMAIL_USER,
              to: process.env.GMAIL_USER,
              subject: `📅 GitHub Project Daily Report (${today})`,
              text: body
            });

            console.log("Mail sent successfully!");
