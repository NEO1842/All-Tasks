name: Project Start Mail

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install nodemailer

      - name: Send Mail
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const nodemailer = require("nodemailer");

            const token = process.env.GITHUB_TOKEN;

            const query = `
            query {
              node(id: "PVT_kwHODIuak84BVv1F") {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      content {
                        ... on Issue {
                          title
                          url
                          state
                        }
                      }
                      fieldValues(first: 30) {
                        nodes {
                          ... on ProjectV2ItemFieldTextValue {
                            text
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                          ... on ProjectV2ItemFieldDateValue {
                            date
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }`;

            const res = await github.graphql(query);
            const items = res.node.items.nodes;

            const today = new Date().toISOString().split("T")[0];

            function getField(item, name) {
              for (const f of item.fieldValues.nodes) {
                if (f.field?.name === name) {
                  return f.text || f.date || f.name || "未設定";
                }
              }
              return "未設定";
            }

            let matched = [];

            for (const item of items) {
              const issue = item.content;
              if (!issue) continue;

              const startDate = getField(item, "Start Date");

              if (startDate === today) {
                matched.push({ issue, item });
              }
            }

            if (matched.length === 0) {
              console.log("No issues today.");
              return;
            }

            let html = `
            <div style="font-family:Arial;background:#f6f7fb;padding:20px">
              <div style="max-width:700px;margin:auto">
                <h2 style="text-align:center">📅 今日開始タスク</h2>
                <hr />
            `;

            for (const m of matched) {
              const issue = m.issue;
              const item = m.item;

              const status = getField(item, "Status");
              const priority = getField(item, "Priority");

              const isDone =
                issue.state === "closed" || status.toLowerCase().includes("done");

              html += `
              <div style="background:#fff;padding:16px;margin:15px 0;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1)">
                <h3>📌 ${issue.title}</h3>

                <p>${isDone ? "✅ 完了" : "⏳ 未完了"}</p>

                <p>🚦 ステータス : ${status}</p>
                <p>🔥 優先度 : ${priority}</p>

                <a href="${issue.url}" style="color:#3498db">🔗 開く</a>
              </div>
              `;
            }

            html += `
              <p style="text-align:center;color:#999;font-size:12px">
                GitHub Actions 自動メール
              </p>
              </div>
            </div>
            `;

            const transporter = nodemailer.createTransport({
              service: "gmail",
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASS
              }
            });

            await transporter.sendMail({
              from: process.env.GMAIL_USER,
              to: process.env.GMAIL_USER,
              subject: `📅 今日開始タスク`,
              html
            });

            console.log("Mail sent!");
