name: Project Start Mail

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Nodemailer
        run: npm install nodemailer

      - name: Check Project Start Dates
        uses: actions/github-script@v7
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const nodemailer = require("nodemailer");

            const today = new Date().toISOString().split("T")[0];

            const query = `
            query {
              node(id: "PVT_kwHODIuak84BVv1F") {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      content {
                        ... on Issue {
                          title
                          url
                          state
                          assignees(first: 10) {
                            nodes { login }
                          }
                          labels(first: 20) {
                            nodes { name }
                          }
                        }
                      }
                      fieldValues(first: 20) {
                        nodes {
                          ... on ProjectV2ItemFieldDateValue {
                            date
                            field {
                              ... on ProjectV2FieldCommon {
                                name
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }`;

            const result = await github.graphql(query);

            let matched = [];

            const normalize = (d) => d ? d.split("T")[0] : null;

            for (const item of result.node.items.nodes) {
              const issue = item.content;
              if (!issue) continue;

              let startDate = null;

              for (const field of item.fieldValues.nodes) {
                if (field.field?.name === "Start Date") {
                  startDate = normalize(field.date);
                }
              }

              if (startDate === today) {
                matched.push(issue);
              }
            }

            if (matched.length === 0) {
              console.log("No issues starting today.");
              return;
            }

            const getLabel = (issue, prefix) =>
              issue.labels?.nodes
                ?.find(l => l.name.toLowerCase().startsWith(prefix))
                ?.name.replace(prefix, "").trim()
              || "未設定";

           const body = matched.map(issue => {

  const isDone = issue.state === "closed" ? "✅ 完了" : "⏳ 未完了";

  const assignees =
    issue.assignees?.nodes?.map(a => a.login).join(", ")
    || "未設定";

  const status = getLabel(issue, "status:");
  const priority = getLabel(issue, "priority:");

  let text = "";

  text += `📌 ${issue.title}\n`;
  text += `${isDone}\n\n`;

  text += `👤 担当者 : ${assignees}\n`;
  text += `🚦 進行状況 : ${status}\n`;
  text += `🔥 優先順位 : ${priority}\n\n`;

  text += `🔗 ${issue.url}\n`;

  return text;

}).join("\n━━━━━━━━━━━━━━━━━━━━\n\n");

            const transporter = nodemailer.createTransport({
              service: "gmail",
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASS
              }
            });

            await transporter.sendMail({
              from: process.env.GMAIL_USER,
              to: process.env.GMAIL_USER,
              subject: `📅 Start Date Tasks (${today})`,
              text: body
            });

            console.log("Mail sent!");
