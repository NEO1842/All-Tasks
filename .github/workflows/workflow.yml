const nodemailer = require("nodemailer");

const token = process.env.GITHUB_TOKEN;

const query = `
query {
  node(id: "PVT_kwHODIuak84BVv1F") {
    ... on ProjectV2 {
      items(first: 100) {
        nodes {
          content {
            ... on Issue {
              title
              url
              state
            }
          }
          fieldValues(first: 30) {
            nodes {
              ... on ProjectV2ItemFieldTextValue {
                text
                field {
                  ... on ProjectV2FieldCommon {
                    name
                  }
                }
              }
              ... on ProjectV2ItemFieldDateValue {
                date
                field {
                  ... on ProjectV2FieldCommon {
                    name
                  }
                }
              }
              ... on ProjectV2ItemFieldSingleSelectValue {
                name
                field {
                  ... on ProjectV2FieldCommon {
                    name
                  }
                }
              }
            }
          }
        }
      }
    }
  }
}
`;

async function main() {
  const res = await fetch("https://api.github.com/graphql", {
    method: "POST",
    headers: {
      Authorization: `Bearer ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ query })
  });

  const json = await res.json();
  const items = json.data.node.items.nodes;

  const today = new Date().toISOString().split("T")[0];

  let matched = [];

  function getField(item, fieldName) {
    for (const f of item.fieldValues.nodes) {
      if (f.field?.name === fieldName) {
        return f.text || f.date || f.name || "未設定";
      }
    }
    return "未設定";
  }

  for (const item of items) {
    const issue = item.content;
    if (!issue) continue;

    const startDate = getField(item, "Start Date");

    if (startDate === today) {
      matched.push({
        issue,
        item
      });
    }
  }

  if (matched.length === 0) {
    console.log("No issues today.");
    return;
  }

  let body = "";

  for (const m of matched) {
    const issue = m.issue;
    const item = m.item;

    const status = getField(item, "Status");
    const priority = getField(item, "Priority");
    const progress = getField(item, "Sub-issues progress");

    const isDone =
      status.toLowerCase().includes("done") ||
      progress.toLowerCase().includes("done") ||
      issue.state === "closed"
        ? "✅ 完了"
        : "⏳ 未完了";

    body += `📌 ${issue.title}\n`;
    body += `${isDone}\n\n`;

    body += `🚦 Status : ${status}\n`;
    body += `🔥 Priority : ${priority}\n`;
    body += `📊 Progress : ${progress}\n\n`;

    body += `🔗 ${issue.url}\n`;
    body += "━━━━━━━━━━━━━━━━━━━━\n\n";
  }

  const transporter = nodemailer.createTransport({
    service: "gmail",
    auth: {
      user: process.env.GMAIL_USER,
      pass: process.env.GMAIL_PASS
    }
  });

  await transporter.sendMail({
    from: process.env.GMAIL_USER,
    to: process.env.GMAIL_USER,
    subject: `📅 Start Date Tasks`,
    text: body
  });

  console.log("Mail sent!");
}

main().catch(console.error);
