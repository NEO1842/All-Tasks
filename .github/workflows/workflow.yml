name: Project Date Mail

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install nodemailer

      - name: Send Date Dashboard Mail
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const nodemailer = require("nodemailer");

            const query = `
            query {
              node(id: "PVT_kwHODIuak84BVv1F") {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      content {
                        ... on Issue {
                          title
                          url
                          state
                        }
                      }
                      fieldValues(first: 30) {
                        nodes {
                          ... on ProjectV2ItemFieldTextValue {
                            text
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                          ... on ProjectV2ItemFieldDateValue {
                            date
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }`;

            const res = await github.graphql(query);
            const items = res.node.items.nodes;

            function getField(item, name) {
              for (const f of item.fieldValues.nodes) {
                if (f.field?.name === name) {
                  return f.text || f.date || f.name || "未設定";
                }
              }
              return "未設定";
            }

            const matched = [];

            for (const item of items) {
              const issue = item.content;
              if (!issue) continue;

              const startDate = getField(item, "Start Date");

              if (startDate === new Date().toISOString().split("T")[0]) {
                matched.push({
                  issue,
                  startDate,
                  targetdate: getField(item, "Target Date"),
                  status: getField(item, "Status"),
                  priority: getField(item, "Priority")
                });
              }
            }

            if (matched.length === 0) {
              console.log("No tasks today.");
              return;
            }

            let html = `
            <div style="font-family:Arial;background:#f6f7fb;padding:20px">
              <div style="max-width:700px;margin:auto">
                <h2 style="text-align:center">📅 タスク日程ダッシュボード</h2>
                <hr />
            `;

            for (const t of matched) {
              const isDone =
                t.issue.state === "closed" || t.status.toLowerCase().includes("done");

              html += `
              <div style="
                background:#fff;
                padding:16px;
                margin:15px 0;
                border-radius:10px;
                box-shadow:0 2px 6px rgba(0,0,0,0.08)
              ">

                <h3>📌 ${t.issue.title}</h3>

                <p>${isDone ? "✅ 完了" : "⏳ 未完了"}</p>

                <p>📅 開始日 : ${t.startDate}</p>
                <p>🎯 目標日 : ${t.targetdate}</p>

                <p>🚦 ステータス : ${t.status}</p>
                <p>🔥 優先度 : ${t.priority}</p>

                <a href="${t.issue.url}"
                   style="
                     display:inline-block;
                     margin-top:10px;
                     padding:8px 14px;
                     background:#3498db;
                     color:#fff;
                     text-decoration:none;
                     border-radius:6px;
                   ">
                  🔗 開く
                </a>

              </div>
              `;
            }

            html += `
              <p style="text-align:center;color:#999;font-size:12px">
                GitHub Actions 自動レポート
              </p>
              </div>
            </div>
            `;

            const transporter = nodemailer.createTransport({
              service: "gmail",
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASS
              }
            });

            await transporter.sendMail({
              from: process.env.GMAIL_USER,
              to: process.env.GMAIL_USER,
              subject: "📅 タスク日程ダッシュボード",
              html
            });

            console.log("Mail sent!");
            
