name: Project Dashboard Mail

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install nodemailer

      - name: Send Dashboard Mail
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const nodemailer = require("nodemailer");

            const query = `
            query {
              node(id: "PVT_kwHODIuak84BVv1F") {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      content {
                        ... on Issue {
                          title
                          url
                          state
                        }
                      }
                      fieldValues(first: 30) {
                        nodes {
                          ... on ProjectV2ItemFieldTextValue {
                            text
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                          ... on ProjectV2ItemFieldDateValue {
                            date
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }`;

            const res = await github.graphql(query);
            const items = res.node.items.nodes;

            const today = new Date().toISOString().split("T")[0];

            function getField(item, name) {
              for (const f of item.fieldValues.nodes) {
                if (f.field?.name === name) {
                  return f.text || f.date || f.name || "未設定";
                }
              }
              return "未設定";
            }

            function progressBar(value) {
              const v = parseInt(value) || 0;
              const clamped = Math.max(0, Math.min(v, 100));
              const filled = Math.round(clamped / 10);
              return "█".repeat(filled) + "░".repeat(10 - filled) + ` ${clamped}%`;
            }

            const tasks = [];

            for (const item of items) {
              const issue = item.content;
              if (!issue) continue;

              const startDate = getField(item, "Start Date");

              if (startDate === today) {
                const status = getField(item, "Status");
                const priority = getField(item, "Priority");
                const progress = getField(item, "Sub-issues progress");

                tasks.push({
                  issue,
                  status,
                  priority,
                  progress
                });
              }
            }

            if (tasks.length === 0) {
              console.log("No tasks today.");
              return;
            }

            // 🏆 優先度ランキングソート
            const priorityRank = {
              "High": 3,
              "Medium": 2,
              "Low": 1
            };

            tasks.sort((a, b) =>
              (priorityRank[b.priority] || 0) - (priorityRank[a.priority] || 0)
            );

            let html = `
            <div style="font-family:Arial;background:#f4f6fb;padding:20px">
              <div style="max-width:800px;margin:auto">
                <h2 style="text-align:center">📊 タスクダッシュボード</h2>
                <p style="text-align:center;color:#888">Start Date 本日分</p>
                <hr />
            `;

            for (const t of tasks) {
              const isDone =
                t.issue.state === "closed" || t.status.toLowerCase().includes("done");

              const statusColor = isDone ? "#2ecc71" : "#f39c12";
              const priorityColor =
                t.priority === "High" ? "#e74c3c" :
                t.priority === "Medium" ? "#f39c12" : "#2ecc71";

              html += `
              <div style="
                background:#fff;
                padding:16px;
                margin:15px 0;
                border-radius:12px;
                box-shadow:0 2px 8px rgba(0,0,0,0.08)
              ">

                <h3>📌 ${t.issue.title}</h3>

                <span style="
                  background:${statusColor};
                  color:#fff;
                  padding:4px 10px;
                  border-radius:20px;
                  font-size:12px;
                ">
                  ${isDone ? "完了" : "未完了"}
                </span>

                <span style="
                  margin-left:8px;
                  background:${priorityColor};
                  color:#fff;
                  padding:4px 10px;
                  border-radius:20px;
                  font-size:12px;
                ">
                  ${t.priority}
                </span>

                <p style="margin-top:10px;">🚦 状態 : ${t.status}</p>

                <p>📊 進捗 : ${progressBar(t.progress)}</p>

                <a href="${t.issue.url}"
                   style="
                     display:inline-block;
                     margin-top:10px;
                     padding:8px 14px;
                     background:#3498db;
                     color:#fff;
                     text-decoration:none;
                     border-radius:6px;
                   ">
                  🔗 Issueを開く
                </a>

              </div>
              `;
            }

            html += `
              <p style="text-align:center;color:#aaa;font-size:12px">
                GitHub Actions Auto Dashboard Mail
              </p>
              </div>
            </div>
            `;

            const transporter = nodemailer.createTransport({
              service: "gmail",
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASS
              }
            });

            await transporter.sendMail({
              from: process.env.GMAIL_USER,
              to: process.env.GMAIL_USER,
              subject: "📊 今日のタスクダッシュボード",
              html
            });

            console.log("Dashboard mail sent!");
